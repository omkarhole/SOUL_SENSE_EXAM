apiVersion: apps/v1
kind: Deployment
metadata:
  name: soulsense-api
  namespace: default
  labels:
    app: soulsense
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: soulsense
      component: api
  template:
    metadata:
      labels:
        app: soulsense
        component: api
    spec:
      containers:
        - name: api
          image: soulsense/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: soulsense-config
            - secretRef:
                name: soulsense-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /startup
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 15
