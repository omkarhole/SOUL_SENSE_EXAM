# Supply Chain Security Workflow
# Issue #1070: Implement Supply Chain Security Hardening
#
# This workflow provides comprehensive supply chain security checks including:
# - Dependency hash verification
# - Automated vulnerability scanning
# - SBOM generation and validation
# - Security gate enforcement

name: Supply Chain Security

on:
  push:
    branches: ["main", "feature/*"]
    paths:
      - "requirements*.txt"
      - "**/requirements*.txt"
      - "pyproject.toml"
      - "setup.py"
      - ".github/workflows/supply-chain-security.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "requirements*.txt"
      - "**/requirements*.txt"
      - "pyproject.toml"
      - "setup.py"
  schedule:
    # Run daily at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  SUPPLY_CHAIN_GATE_ENABLED: true
  HASH_VERIFICATION_ENABLED: true
  VULNERABILITY_THRESHOLD: high

jobs:
  dependency-hash-verification:
    name: Verify Dependency Hashes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run supply chain security check
        run: |
          python scripts/supply_chain_security.py --gate --fail-on-issues
        working-directory: ${{ github.workspace }}

      - name: Check requirements-pinned.txt exists
        run: |
          if [ ! -f requirements-pinned.txt ]; then
            echo "⚠️ Warning: requirements-pinned.txt not found. Consider creating one with hashed dependencies."
            echo "See: https://pip.pypa.io/en/stable/cli/pip_install/#hash-checking-mode"
          else
            echo "✅ requirements-pinned.txt found"
          fi

      - name: Validate hash coverage
        run: |
          python scripts/supply_chain_security.py --report hash-report.json
          echo "Hash verification report generated"
        working-directory: ${{ github.workspace }}

      - name: Upload hash verification report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hash-verification-report-${{ github.sha }}
          path: hash-report.json
          retention-days: 90

  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    needs: dependency-hash-verification
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: |
          pip install --upgrade pip
          pip install bandit safety cyclonedx-bom pip-audit

      - name: Run pip-audit scan
        run: |
          pip-audit --format=json --output=pip-audit-report.json || true
          pip-audit --format=markdown --output=pip-audit-report.md || true
        continue-on-error: true

      - name: Run Safety vulnerability scan
        run: |
          if [ -f requirements.txt ]; then
            safety check -r requirements.txt --json --output safety-report.json || true
            safety check -r requirements.txt --severity-threshold ${{ env.VULNERABILITY_THRESHOLD }} || true
          fi
          if [ -f backend/fastapi/requirements.txt ]; then
            safety check -r backend/fastapi/requirements.txt --json --output safety-report-backend.json || true
          fi
        continue-on-error: true

      - name: Upload vulnerability reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vulnerability-reports-${{ github.sha }}
          path: |
            pip-audit-report.json
            pip-audit-report.md
            safety-report.json
            safety-report-backend.json
          retention-days: 90

      - name: Comment PR with vulnerability summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '## 🔒 Supply Chain Security Scan Results\n\n';
            
            try {
              if (fs.existsSync('pip-audit-report.json')) {
                const auditReport = JSON.parse(fs.readFileSync('pip-audit-report.json', 'utf8'));
                const vulnCount = auditReport.vulnerabilities ? auditReport.vulnerabilities.length : 0;
                summary += `### pip-audit Results\n`;
                summary += `- Vulnerabilities found: ${vulnCount}\n\n`;
              }
            } catch (e) {
              summary += `### pip-audit Results\n- Unable to parse report\n\n`;
            }
            
            summary += `### Summary\n`;
            summary += `- Hash verification: ✅ Enabled\n`;
            summary += `- Vulnerability threshold: ${process.env.VULNERABILITY_THRESHOLD}\n`;
            summary += `- Full reports available in workflow artifacts\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  sbom-generation:
    name: Generate and Validate SBOM
    runs-on: ubuntu-latest
    needs: vulnerability-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SBOM tools
        run: |
          pip install cyclonedx-bom

      - name: Generate SBOM
        run: |
          python scripts/generate_sbom.py --output sbom.json --project-root .
        working-directory: ${{ github.workspace }}

      - name: Validate SBOM
        run: |
          python scripts/generate_sbom.py --validate-only --output sbom.json
        working-directory: ${{ github.workspace }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 365

      - name: Upload SBOM to Dependency Graph
        uses: advanced-security/sbom-generator-action@v0.0.1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          format: 'json'
          path: sbom.json

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: true
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-3-Clause, ISC
          deny-licenses: GPL-2.0, GPL-3.0

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [dependency-hash-verification, vulnerability-scan, sbom-generation]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "Dependency hash verification: ${{ needs.dependency-hash-verification.result }}"
          echo "Vulnerability scan: ${{ needs.vulnerability-scan.result }}"
          echo "SBOM generation: ${{ needs.sbom-generation.result }}"
          
          if [ "${{ needs.dependency-hash-verification.result }}" == "failure" ] || \
             [ "${{ needs.vulnerability-scan.result }}" == "failure" ] || \
             [ "${{ needs.sbom-generation.result }}" == "failure" ]; then
            echo "❌ Security gate FAILED - one or more checks failed"
            exit 1
          fi
          
          echo "✅ Security gate PASSED"

      - name: Generate security summary
        if: always()
        run: |
          cat > security-summary.md << 'EOF'
          # Supply Chain Security Gate Summary
          
          | Check | Status |
          |-------|--------|
          | Dependency Hash Verification | ${{ needs.dependency-hash-verification.result }} |
          | Vulnerability Scan | ${{ needs.vulnerability-scan.result }} |
          | SBOM Generation | ${{ needs.sbom-generation.result }} |
          
          EOF
          
          cat security-summary.md

      - name: Upload security summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-summary-${{ github.sha }}
          path: security-summary.md
          retention-days: 30
